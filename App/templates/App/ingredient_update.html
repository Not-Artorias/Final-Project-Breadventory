<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Ingredient - Breadventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #0d9488;
            --sidebar-bg: #1e293b;
            --body-bg: #f8fafc;
            --text-main: #334155;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: var(--body-bg);
            color: var(--text-main);
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background-color: var(--sidebar-bg);
            padding: 30px 0;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-brand {
            padding: 0 25px 30px;
            color: white !important;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            display: block;
            transition: opacity 0.2s;
        }

        .sidebar a.sidebar-brand:hover {
            background-color: transparent !important;
            color: white !important;
            opacity: 0.8;
        }

        .sidebar a {
            display: block;
            padding: 12px 25px;
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

            .sidebar a:hover {
                background-color: #334155;
                color: white;
                border-left: 4px solid var(--primary-teal);
            }

        .content {
            margin-left: 240px;
            padding: 40px;
            width: calc(100% - 240px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            border: 1px solid #e2e8f0;
        }

        h2 {
            color: #1e293b;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-teal);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }

        .button-container {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-primary {
            background-color: var(--primary-teal);
            color: white;
        }

            .btn-primary:hover {
                background-color: #0f766e;
            }

        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="{% url 'index' %}" class="sidebar-brand">Breadventory</a>
        <a href="{% url 'product_create' %}">Add Product</a>
        <a href="{% url 'product_list' %}">Manage Inventory</a>
        <a href="{% url 'ingredients' %}" style="color: white; background: #334155; border-left: 4px solid var(--primary-teal);">Ingredients</a>
        <a href="{% url 'Saletable' %}">Sales</a>
        <div style="margin-top: auto;">
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>

    <div class="content">
        <div class="form-container">
            <h2>Update Ingredient: {{ ingredient.name }}</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label for="name">Ingredient Name</label>
                    <input type="text" name="name" id="name" value="{{ ingredient.name }}" required>
                </div>

                <div class="form-group">
                    <label for="unit">Unit</label>
                    <input type="text" name="unit" id="unit" value="{{ ingredient.unit }}" required>
                </div>

                <div class="form-group">
                    <label for="stock_qty">Stock Quantity</label>
                    <input type="number" name="stock_qty" id="stock_qty" value="{{ ingredient.stock_qty }}" required>
                </div>

                <div class="form-group">
                    <label for="expiration_date">Expiration Date</label>
                    <input type="date" name="expiration_date" id="expiration_date" value="{{ ingredient.expiration_date|date:'Y-m-d' }}" required>
                </div>

                <div class="button-container">
                    <a href="{% url 'ingredients' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Update Ingredient</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
