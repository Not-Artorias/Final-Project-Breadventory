<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Product - Breadventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger-red: #ef4444;
            --sidebar-bg: #1e293b;
            --body-bg: #f8fafc;
            --text-main: #334155;
            --primary-teal: #0d9488;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: var(--body-bg);
            color: var(--text-main);
        }

        /* Sidebar - Standardized */
        .sidebar {
            width: 240px;
            height: 100vh;
            background-color: var(--sidebar-bg);
            padding: 30px 0;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-brand {
            padding: 0 25px 30px;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sidebar a {
            display: block;
            padding: 12px 25px;
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

            .sidebar a:hover {
                background-color: #334155;
                color: white;
                border-left: 4px solid var(--primary-teal);
            }

        /* Main Content */
        .content {
            margin-left: 240px;
            padding: 40px;
            width: calc(100% - 240px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .delete-card {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            text-align: center;
            border-top: 5px solid var(--danger-red);
        }

        h2 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .warning-text {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .product-summary {
            background: #fef2f2;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #fee2e2;
        }

            .product-summary h3 {
                margin: 0;
                color: #991b1b;
                font-size: 1.2rem;
            }

            .product-summary p {
                margin: 5px 0 0;
                font-size: 0.9rem;
                color: #b91c1c;
            }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-danger {
            background-color: var(--danger-red);
            color: white;
        }

            .btn-danger:hover {
                background-color: #dc2626;
                transform: translateY(-2px);
            }

        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
        }

            .btn-secondary:hover {
                background-color: #e2e8f0;
            }

        .sidebar-brand {
            padding: 0 25px 30px;
            color: white !important;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            display: block;
            transition: opacity 0.2s;
        }

        .sidebar a.sidebar-brand:hover {
            background-color: transparent !important;
            color: white !important;
            border-left: 4px solid transparent !important;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="{% url 'index' %}" class="sidebar-brand">Breadventory</a>
        <a href="{% url 'product_create' %}">Add Product</a>
        <a href="{% url 'product_list' %}">Manage Inventory</a>
        <a href="{% url 'ingredients' %}">Ingredients</a>
        <a href="{% url 'Saletable' %}">Sales</a>
        <div style="margin-top: auto;">
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>

    <div class="content">
        <div class="delete-card">
            <h2>Confirm Deletion</h2>
            <p class="warning-text">This action cannot be undone. Are you sure you want to remove this item from your inventory?</p>

            <div class="product-summary">
                <h3>{{ product.name }}</h3>
                <p>₱{{ product.price }} • {{ product.stock_qty }} in stock</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="button-container">
                    <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-danger">Confirm Delete</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
